name: Trigger auto deployment for pipeline-orchestrator

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ develop ]
    paths:
    - '**'
    - '.github/workflows/pipeline-orchestrator-AutoDeployTrigger-2e312c68-02b7-4181-9e28-344162240f49.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PIPELINEORCHESTRATOR_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PIPELINEORCHESTRATOR_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PIPELINEORCHESTRATOR_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acragentpoc67.azurecr.io
          registryUsername: ${{ secrets.PIPELINEORCHESTRATOR_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PIPELINEORCHESTRATOR_REGISTRY_PASSWORD }}
          containerAppName: pipeline-orchestrator
          resourceGroup: rg-agent-poc
          imageToBuild: acragentpoc67.azurecr.io/pipeline-orchestrator:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_
